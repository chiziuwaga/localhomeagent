version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
    groups:
      site-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/agent"
    schedule:
      interval: "weekly"
    groups:
      agent-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
