name: Release agent binaries

# Triggered by pushing a tag like v0.2.0. Builds standalone Windows / macOS /
# Linux binaries via PyInstaller and attaches them to a GitHub Release.
#
# This workflow is disabled by default — uncomment the `on.push.tags` line to
# enable. The agent runtime is currently a /health-only scaffold; we don't
# want to publish broken binaries until real features land.

on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: local-home-agent-windows-amd64.exe
            pyinstaller_args: --onefile --name local-home-agent.exe
          - os: macos-latest
            artifact: local-home-agent-macos-arm64
            pyinstaller_args: --onefile --name local-home-agent
          - os: ubuntu-latest
            artifact: local-home-agent-linux-amd64
            pyinstaller_args: --onefile --name local-home-agent
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./agent
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime + PyInstaller
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build single-file binary
        run: pyinstaller ${{ matrix.pyinstaller_args }} src/local_home_agent/__main__.py

      # TODO: code-signing
      # Windows: requires Authenticode cert from Sectigo/DigiCert + signtool.exe
      # macOS:   requires Apple Developer cert + codesign + notarization
      # Linux:   recommend GPG-signed AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: agent/dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
