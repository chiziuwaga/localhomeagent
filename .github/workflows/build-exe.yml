name: Build Local Home Agent

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q tests/

  build-windows:
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller build.spec --clean

      - name: List dist folder
        run: dir dist

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $hash = Get-FileHash -Algorithm SHA256 dist/LocalHomeAgent.exe
          "$($hash.Hash.ToLower())  LocalHomeAgent.exe" | Out-File -Encoding ascii dist/LocalHomeAgent.exe.sha256
          Get-Content dist/LocalHomeAgent.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoLiving-Home-Agent-Windows
          path: |
            dist/LocalHomeAgent.exe
            dist/LocalHomeAgent.exe.sha256
          retention-days: 30
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller build.spec --clean

      - name: List dist folder
        run: ls -la dist/

      - name: Generate SHA256 checksum
        run: |
          cd dist
          sha256sum LocalHomeAgent > LocalHomeAgent.sha256
          cat LocalHomeAgent.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoLiving-Home-Agent-Linux
          path: |
            dist/LocalHomeAgent
            dist/LocalHomeAgent.sha256
          retention-days: 30
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller build.spec --clean

      - name: List dist folder
        run: ls -la dist/

      - name: Generate SHA256 checksum
        run: |
          cd dist
          shasum -a 256 LocalHomeAgent > LocalHomeAgent.sha256
          cat LocalHomeAgent.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoLiving-Home-Agent-macOS
          path: |
            dist/LocalHomeAgent
            dist/LocalHomeAgent.sha256
          retention-days: 30
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: CoLiving-Home-Agent-Windows
          path: ./windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: CoLiving-Home-Agent-Linux
          path: ./linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: CoLiving-Home-Agent-macOS
          path: ./macos

      - name: Rename artifacts and aggregate checksums
        run: |
          mv ./windows/LocalHomeAgent.exe ./CoLiving-Home-Agent-Windows.exe
          mv ./linux/LocalHomeAgent ./CoLiving-Home-Agent-Linux
          chmod +x ./CoLiving-Home-Agent-Linux
          mv ./macos/LocalHomeAgent ./CoLiving-Home-Agent-macOS
          chmod +x ./CoLiving-Home-Agent-macOS
          # Re-emit checksums against the renamed files for clarity.
          sha256sum CoLiving-Home-Agent-Windows.exe \
                    CoLiving-Home-Agent-Linux \
                    CoLiving-Home-Agent-macOS \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CoLiving-Home-Agent-Windows.exe
            CoLiving-Home-Agent-Linux
            CoLiving-Home-Agent-macOS
            SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
