name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  site:
    name: Site (Vite + TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload site dist
        uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: site/dist
          retention-days: 7

  agent:
    name: Agent (Python / FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./agent
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports src
        continue-on-error: true

      - name: Test (pytest)
        run: pytest -q
        continue-on-error: true # no tests yet — won't fail until they exist
