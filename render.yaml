# Render Blueprint — Local Home Agent landing site
# Deploys site/dist as a static site at localhomeagent.fixitforme.ai

services:
  - type: static
    name: localhomeagent-site
    buildCommand: cd site && npm install && npm run build
    staticPublishPath: site/dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
